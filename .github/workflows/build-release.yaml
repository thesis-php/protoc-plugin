name: Build and release

on:
  push:
    tags: ["*"]

jobs:
  phar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: box

      - name: Install dependencies
        run: composer install

      - name: Build executable PHAR
        run: box compile

      - name: Push phar
        uses: softprops/action-gh-release@v1
        if: github.ref_type == 'tag'
        with:
          files: protoc-gen-php

  docker:
    runs-on: ubuntu-latest
    needs: phar
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub container registry
        uses: docker/login-action@v3
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract tag name
        id: tag
        run: echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          build-args: PROTOC_PLUGIN_VERSION=${{ steps.tag.outputs.version }}
          tags: |
            ghcr.io/thesis-php/protoc-plugin:${{ steps.tag.outputs.version }}
            ghcr.io/thesis-php/protoc-plugin:latest
          push: true
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  codegen-downstream:
    runs-on: ubuntu-latest
    needs: docker
    strategy:
      fail-fast: false
      matrix:
        include:
          - repository: thesis-php/googleapis-rpc-types
          - repository: thesis-php/google-types
          - repository: thesis-php/protobuf-compiler-types
          - repository: thesis-php/protobuf-descriptor-types
          - repository: thesis-php/protobuf-known-types

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.repository }}
          token: ${{ secrets.DOWNSTREAM_RELEASE_TOKEN }}
          path: downstream
          submodules: recursive

      - name: Run codegen update
        working-directory: downstream
        run: make compile

      - name: Create codegen pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.DOWNSTREAM_RELEASE_TOKEN }}
          path: downstream
          commit-message: "chore: regenerate code for protoc-plugin ${{ github.ref_name }}"
          branch: "chore/protoc-plugin-${{ github.ref_name }}"
          delete-branch: true
          title: "chore: regenerate code for protoc-plugin ${{ github.ref_name }}"
          body: |
            Automated update triggered by protoc-plugin release `${{ github.ref_name }}`.

            - Source repository: `${{ github.repository }}`
            - Build workflow run: `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
