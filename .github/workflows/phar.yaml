name: Build Phar

on:
  workflow_dispatch: ~
  push:
    branches: [main, '*.*.x']
  pull_request: ~

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: box

      - name: Install dependencies
        run: |
          composer install

      - name: Build executable PHAR
        run: |
          box compile

      - name: Push phar
        uses: softprops/action-gh-release@v1
        with:
          files: protoc-gen-php
